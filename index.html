<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>🍳 Cooking App - Pi Payment</title>

  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
    }

    button {
      padding: 14px 22px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 20px;
    }

    #status {
      margin-top: 25px;
      font-weight: bold;
      white-space: pre-line;
    }

    .box {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #ddd;
      display: inline-block;
      min-width: 280px;
    }
  </style>
</head>

<body>

  <h1>🍳 Cooking App</h1>

  <div class="box">
    <button onclick="payWithPi()">Payer avec Pi</button>
    <div id="status">Status: initialisation...</div>
  </div>

  <script>
    const statusDiv = document.getElementById("status");

    function setStatus(msg) {
      console.log(msg);
      statusDiv.innerText = "Status: " + msg;
    }

    // =========================
    // 1. PI SDK CHECK
    // =========================
    const Pi = window.Pi;

    function isPiReady() {
      return window.Pi && window.Pi.createPayment;
    }

    if (!isPiReady()) {
      setStatus("❌ Pi SDK non détecté\nOuvre dans Pi Browser");
    } else {
      Pi.init({ version: "2.0" });
      setStatus("✔️ Pi SDK détecté");
    }

    // =========================
    // 2. WAIT SAFE (ANTI BUG)
    // =========================
    function waitForPi(callback) {
      const interval = setInterval(() => {
        if (isPiReady()) {
          clearInterval(interval);
          callback();
        }
      }, 200);

      // timeout sécurité
      setTimeout(() => {
        clearInterval(interval);
        setStatus("❌ Pi SDK timeout (non chargé)");
      }, 5000);
    }

    // =========================
    // 3. PAYMENT FLOW
    // =========================
    async function payWithPi() {

      setStatus("🔄 Vérification Pi SDK...");

      if (!isPiReady()) {
        setStatus("❌ Pi SDK indisponible\n➡️ Ouvre dans Pi Browser");
        alert("Cette app doit être ouverte dans Pi Browser");
        return;
      }

      setStatus("✔️ SDK OK - préparation paiement...");

      const paymentData = {
        amount: 1,
        memo: "Cooking App Order",
        metadata: { product: "food" }
      };

      try {

        await Pi.createPayment(paymentData, {

          // =====================
          // APPROVAL STEP
          // =====================
          onReadyForServerApproval: async (paymentId) => {
            setStatus("⏳ Approval en cours...");

            try {
              const res = await fetch("/api/approve", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ paymentId })
              });

              const data = await res.json();
              console.log("APPROVE:", data);

              if (!res.ok) {
                setStatus("❌ Erreur approval serveur");
              } else {
                setStatus("✔️ Approval OK");
              }

            } catch (err) {
              console.error(err);
              setStatus("❌ Erreur réseau approval");
            }
          },

          // =====================
          // COMPLETION STEP
          // =====================
          onReadyForServerCompletion: async (paymentId, txid) => {
            setStatus("⏳ Completion en cours...");

            try {
              const res = await fetch("/api/complete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ paymentId, txid })
              });

              const data = await res.json();
              console.log("COMPLETE:", data);

              if (!res.ok) {
                setStatus("❌ Erreur completion serveur");
              } else {
                setStatus("🎉 Paiement réussi !");
              }

            } catch (err) {
              console.error(err);
              setStatus("❌ Erreur réseau completion");
            }
          },

          // =====================
          // CANCEL
          // =====================
          onCancel: (paymentId) => {
            console.log("CANCEL:", paymentId);
            setStatus("⚠️ Paiement annulé");
          },

          // =====================
          // ERROR
          // =====================
          onError: (error) => {
            console.error("PAYMENT ERROR:", error);
            setStatus("❌ Erreur paiement Pi");
          }

        });

      } catch (err) {
        console.error("CRITICAL ERROR:", err);
        setStatus("❌ createPayment a échoué\nVoir console");
      }
    }
  </script>

</body>
</html>
