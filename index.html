<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>🍳 Cooking App - Pi Payment</title>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }

    button {
      padding: 14px 22px;
      font-size: 18px;
      margin-top: 20px;
    }

    #status {
      margin-top: 20px;
      white-space: pre-line;
      font-weight: bold;
      border: 1px solid #ddd;
      padding: 10px;
    }
  </style>
</head>

<body>

  <h1>🍳 Cooking App</h1>

  <button onclick="startPayment()">Payer avec Pi</button>

  <div id="status">Initialisation...</div>

  <script>

    const statusDiv = document.getElementById("status");

    function log(msg) {
      statusDiv.innerText += "\n" + msg;
    }

    function setStatus(msg) {
      statusDiv.innerText = msg;
    }

    // =========================
    // INIT PI SDK SAFE
    // =========================
    function initPi() {
      try {
        if (window.Pi) {
          window.Pi.init({ version: "2.0" });
          setStatus("✔️ Pi SDK détecté");
        } else {
          setStatus("❌ Pi SDK introuvable (ouvre dans Pi Browser)");
        }
      } catch (e) {
        setStatus("❌ Erreur init Pi SDK");
      }
    }

    // attendre Pi
    let tries = 0;
    const interval = setInterval(() => {
      tries++;

      if (window.Pi) {
        initPi();
        clearInterval(interval);
      }

      if (tries > 10) {
        setStatus("❌ Pi SDK non chargé");
        clearInterval(interval);
      }

    }, 500);

    // =========================
    // PAYMENT
    // =========================
    async function startPayment() {

      setStatus("🔄 DEBUG PI...");

      // 🔥 DEBUG IMPORTANT (visible écran)
      log("Pi type: " + typeof window.Pi);
      log("createPayment type: " + typeof window.Pi?.createPayment);

      if (!window.Pi || !window.Pi.createPayment) {
        setStatus("❌ createPayment introuvable\nOuvre dans Pi Browser");
        return;
      }

      setStatus("✔️ SDK OK - lancement paiement...");

      try {

        window.Pi.createPayment(
          {
            amount: 1,
            memo: "Cooking App Order",
            metadata: { product: "food" }
          },
          {

            // APPROVAL
            onReadyForServerApproval: async (paymentId) => {
              log("APPROVE: " + paymentId);

              await fetch("/api/approve", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ paymentId })
              });

              log("✔️ approve envoyé");
            },

            // COMPLETE
            onReadyForServerCompletion: async (paymentId, txid) => {
              log("COMPLETE: " + paymentId);

              await fetch("/api/complete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ paymentId, txid })
              });

              log("🎉 paiement complété");
            },

            onCancel: (paymentId) => {
              setStatus("⚠️ paiement annulé");
            },

            onError: (err) => {
              log("❌ ERROR: " + JSON.stringify(err));
              setStatus("❌ erreur paiement Pi");
            }

          }
        );

      } catch (e) {
        log("CRITICAL ERROR: " + e);
        setStatus("❌ createPayment FAILED");
      }
    }

  </script>

</body>
</html>
