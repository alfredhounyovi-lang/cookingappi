<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cooking App</title>
  <script src="https://minepi.com"></script>
</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 50px;">

  <h1>🍳 Cooking App du Proviseur</h1>
  <button id="btn-pay" onclick="pay()" style="padding: 20px; font-size: 1.2rem; cursor: pointer;">
    Payer 0.01 Pi pour Valider
  </button>
  <p id="status" style="font-weight: bold; margin-top: 20px;"></p>

  <script>
    Pi.init({ version: "2.0" });

    async function pay() {
      const status = document.getElementById("status");
      status.innerText = "Initialisation...";

      try {
        // 1. Authentification
        const user = await Pi.authenticate(['payments'], (payment) => {
          console.log("Paiement incomplet trouvé", payment);
        });

        // 2. Création du paiement
        await Pi.createPayment({
          amount: 0.01,
          memo: "Validation Etape 10 - CookingApp",
          metadata: { orderId: "prod_001" }
        }, {
          onReadyForServerApproval: async (paymentId) => {
            status.innerText = "Approbation par le serveur...";
            return fetch("/api/approve", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentId })
            });
          },
          onReadyForServerCompletion: async (paymentId, txid) => {
            status.innerText = "Finalisation de la transaction...";
            return fetch("/api/complete", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentId, txid })
            });
          },
          onCancel: () => status.innerText = "Paiement annulé ❌",
          onError: (error) => {
            console.error(error);
            status.innerText = "Erreur : " + error.message;
          }
        });

        status.innerText = "Paiement réussi ! Étape 10 validée ✅";
        status.style.color = "green";

      } catch (err) {
        status.innerText = "Erreur de connexion ❌";
      }
    }
  </script>
</body>
</html>
