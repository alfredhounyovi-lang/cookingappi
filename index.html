<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>🍳 Cooking App - Pi Mainnet</title>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }

    button {
      padding: 14px 22px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 20px;
    }

    #status {
      margin-top: 20px;
      font-weight: bold;
      white-space: pre-line;
    }
  </style>
</head>

<body>

  <h1>🍳 Cooking App</h1>

  <button onclick="startPayment()">Payer avec Pi</button>

  <div id="status">Initialisation...</div>

  <script>
    const statusDiv = document.getElementById("status");

    function setStatus(msg) {
      console.log(msg);
      statusDiv.innerText = "Status: " + msg;
    }

    // =========================
    // SAFE PI INIT (IMPORTANT)
    // =========================
    let Pi = null;

    function initPiSafe() {
      try {
        if (window.Pi) {
          Pi = window.Pi;
          Pi.init({ version: "2.0" });
          setStatus("✔️ Pi SDK initialisé");
        } else {
          setStatus("❌ Pi SDK non disponible");
        }
      } catch (e) {
        console.error(e);
        setStatus("❌ Erreur init Pi SDK");
      }
    }

    // retry init (Pi Browser charge parfois après DOM)
    let initAttempts = 0;
    const initInterval = setInterval(() => {
      initAttempts++;

      if (window.Pi && window.Pi.createPayment) {
        initPiSafe();
        clearInterval(initInterval);
      }

      if (initAttempts > 10) {
        clearInterval(initInterval);
        setStatus("❌ Pi SDK non détecté (ouvre dans Pi Browser)");
      }
    }, 500);

    // =========================
    // WAIT SAFE
    // =========================
    function waitForPiReady() {
      return new Promise((resolve, reject) => {
        let tries = 0;

        const t = setInterval(() => {
          tries++;

          if (window.Pi && window.Pi.createPayment) {
            clearInterval(t);
            resolve(true);
          }

          if (tries > 10) {
            clearInterval(t);
            reject("Pi SDK timeout");
          }
        }, 300);
      });
    }

    // =========================
    // PAYMENT FUNCTION
    // =========================
    async function startPayment() {

      setStatus("🔄 Vérification Pi SDK...");

      try {
        await waitForPiReady();
      } catch (e) {
        setStatus("❌ Pi SDK non prêt");
        alert("Pi SDK non disponible. Ouvre dans Pi Browser.");
        return;
      }

      if (!window.Pi || !window.Pi.createPayment) {
        setStatus("❌ Pi SDK invalide");
        return;
      }

      setStatus("✔️ SDK OK - lancement paiement...");

      const paymentData = {
        amount: 1,
        memo: "Cooking App Order",
        metadata: { product: "food" }
      };

      try {

        await window.Pi.createPayment(paymentData, {

          // APPROVE
          onReadyForServerApproval: async (paymentId) => {
            setStatus("⏳ Approval...");

            try {
              await fetch("/api/approve", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ paymentId })
              });

              setStatus("✔️ Approval envoyé");

            } catch (e) {
              console.error(e);
              setStatus("❌ Erreur approval");
            }
          },

          // COMPLETE
          onReadyForServerCompletion: async (paymentId, txid) => {
            setStatus("⏳ Completion...");

            try {
              await fetch("/api/complete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ paymentId, txid })
              });

              setStatus("🎉 Paiement terminé");

            } catch (e) {
              console.error(e);
              setStatus("❌ Erreur completion");
            }
          },

          onCancel: () => {
            setStatus("⚠️ Paiement annulé");
          },

          onError: (err) => {
            console.error(err);
            setStatus("❌ Erreur Pi payment");
          }

        });

      } catch (err) {
        console.error(err);
        setStatus("❌ createPayment FAILED\nVoir console");
      }
    }
  </script>

</body>
</html>
