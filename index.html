<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cooking App</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body style="font-family: Arial; text-align: center; margin-top: 50px;">

  <h1>Bienvenue sur Cooking App 🍳</h1>
  <p>Teste un paiement Pi pour valider l’application</p>

  <button onclick="pay()" style="padding: 15px; font-size: 16px;">
    Payer avec Pi
  </button>

  <p id="status"></p>

  <script>
    Pi.init({ version: "2.0" });

    let currentUser = null;

    async function authenticate() {
      try {
        currentUser = await Pi.authenticate(['payments'], onIncompletePaymentFound);
        document.getElementById("status").innerText = "Connecté ✅";
      } catch (error) {
        document.getElementById("status").innerText = "Erreur connexion ❌";
        throw error;
      }
    }

    async function pay() {
      try {
        if (!currentUser) await authenticate();

        const paymentData = {
          amount: 0.01,
          memo: "Test Cooking App",
          metadata: { orderId: "001" }
        };

        await Pi.createPayment(paymentData, {

          onReadyForServerApproval: async function(paymentId) {
            await fetch("/api/approve", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentId })
            });
          },

          onReadyForServerCompletion: async function(paymentId, txid) {
            await fetch("/api/complete", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentId, txid })
            });

            document.getElementById("status").innerText = "Paiement réussi ✅";
          },

          onCancel: function() {
            document.getElementById("status").innerText = "Paiement annulé ❌";
          },

          onError: function(error) {
            console.error(error);
            document.getElementById("status").innerText = "Erreur paiement ❌";
          }

        });

      } catch (error) {
        console.error(error);
        document.getElementById("status").innerText = "Erreur générale ❌";
      }
    }

    function onIncompletePaymentFound(payment) {
      console.log("Incomplete payment:", payment);
    }
  </script>

</body>
</html>
