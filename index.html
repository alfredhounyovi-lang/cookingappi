<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>🍳 Cooking App - Pi</title>

  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }

    button {
      padding: 14px 22px;
      font-size: 18px;
      margin-top: 20px;
    }

    #status {
      margin-top: 20px;
      white-space: pre-line;
      font-weight: bold;
      border: 1px solid #ddd;
      padding: 10px;
    }
  </style>
</head>

<body>

  <h1>🍳 Cooking App</h1>

  <button onclick="startPayment()">Payer avec Pi</button>

  <div id="status">Initialisation...</div>

  <script>

    const statusDiv = document.getElementById("status");

    function setStatus(msg) {
      statusDiv.innerText = msg;
      console.log(msg);
    }

    function log(msg) {
      statusDiv.innerText += "\n" + msg;
      console.log(msg);
    }

    // =========================
    // SAFE PI INIT
    // =========================
    function isPiReady() {
      return window.Pi && typeof window.Pi.createPayment === "function";
    }

    function initPi() {
      try {
        if (window.Pi) {
          window.Pi.init({ version: "2.0" });
          setStatus("✔️ Pi SDK détecté");
        } else {
          setStatus("❌ Pi SDK non détecté");
        }
      } catch (e) {
        setStatus("❌ Erreur init Pi SDK");
      }
    }

    // retry init (important Pi Browser)
    let tries = 0;
    const interval = setInterval(() => {
      tries++;

      if (window.Pi) {
        initPi();
        clearInterval(interval);
      }

      if (tries > 10) {
        setStatus("❌ Pi SDK introuvable (ouvre dans Pi Browser)");
        clearInterval(interval);
      }
    }, 500);

    // =========================
    // PAYMENT FUNCTION
    // =========================
    async function startPayment() {

      setStatus("🔄 Vérification Pi SDK...");

      // WAIT SAFE (IMPORTANT FIX PI BROWSER)
      let attempts = 0;
      while (!isPiReady() && attempts < 20) {
        await new Promise(r => setTimeout(r, 300));
        attempts++;
      }

      // CHECK FINAL
      if (!isPiReady()) {
        setStatus("❌ createPayment indisponible\n➡️ Ouvre dans Pi Browser officiel");
        return;
      }

      setStatus("✔️ Pi SDK OK - lancement paiement...");

      try {

        window.Pi.createPayment(
          {
            amount: 1,
            memo: "Cooking App Order",
            metadata: { product: "food" }
          },
          {

            // =====================
            // APPROVAL
            // =====================
            onReadyForServerApproval: async (paymentId) => {
              log("APPROVE: " + paymentId);

              try {
                const res = await fetch("/api/approve", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ paymentId })
                });

                if (res.ok) log("✔️ approve OK");
                else log("❌ approve error");

              } catch (e) {
                log("❌ approve network error");
              }
            },

            // =====================
            // COMPLETION
            // =====================
            onReadyForServerCompletion: async (paymentId, txid) => {
              log("COMPLETE: " + paymentId);

              try {
                const res = await fetch("/api/complete", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ paymentId, txid })
                });

                if (res.ok) log("🎉 complete OK");
                else log("❌ complete error");

              } catch (e) {
                log("❌ complete network error");
              }
            },

            onCancel: () => {
              setStatus("⚠️ Paiement annulé");
            },

            onError: (err) => {
              log("❌ ERROR: " + JSON.stringify(err));
              setStatus("❌ Pi payment error");
            }

          }
        );

      } catch (e) {
        console.error(e);
        setStatus("❌ createPayment FAILED\nVoir logs écran");
      }
    }

  </script>

  <!-- Garde tout ton code actuel au-dessus -->
<hr style="margin-top: 50px;">
<h3>🧪 Section Testnet (10 transactions requises)</h3>
<p>Entrez l'adresse Testnet d'un ami pour lui envoyer 0.1 Pi de test</p>
<input type="text" id="friend-wallet" placeholder="Adresse G..." style="width: 80%; padding: 10px;">
<button onclick="sendTestReward()">Envoyer Récompense Testnet</button>

<script>
// Ajoute cette fonction à la fin de ton <script> actuel
async function sendTestReward() {
  const addr = document.getElementById("friend-wallet").value;
  if(!addr) return alert("Veuillez entrer une adresse de portefeuille !");
  
  setStatus("🔄 Envoi de la récompense Testnet...");
  
  try {
    const res = await fetch("/api/testnet-reward", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ userWalletAddress: addr })
    });
    
    if (res.ok) {
        log("✔️ Récompense envoyée avec succès à " + addr);
        alert("Transaction réussie !");
    } else {
        log("❌ Erreur lors de l'envoi de la récompense");
    }
  } catch (e) {
    log("❌ Erreur réseau Testnet");
  }
}
</script>

</body>
</html>
